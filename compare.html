<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Model Comparison - Color Box Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bg-gray-50 font-sans">
    
    <!-- Application Header -->
    <header class="bg-white shadow-sm border-b border-gray-200">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">
          
          <!-- Logo & Brand -->
          <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-gradient-to-br from-blue-500 to-purple-600 rounded-lg flex items-center justify-center">
              <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M3 4a1 1 0 011-1h12a1 1 0 011 1v2a1 1 0 01-1 1H4a1 1 0 01-1-1V4zm0 4a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H4a1 1 0 01-1-1V8zm8 0a1 1 0 011-1h4a1 1 0 011 1v2a1 1 0 01-1 1h-4a1 1 0 01-1-1V8zm0 4a1 1 0 011-1h4a1 1 0 011 1v2a1 1 0 01-1 1h-4a1 1 0 01-1-1v-2z" clip-rule="evenodd"></path>
              </svg>
            </div>
            <div>
              <h1 class="text-xl font-bold text-gray-900">AI Game Trainer</h1>
              <p class="text-xs text-gray-500">Neural Evolution Platform</p>
            </div>
          </div>

          <!-- Navigation -->
          <nav class="flex items-center gap-1">
            <a href="player.html" class="px-4 py-2 text-gray-600 hover:text-gray-900 hover:bg-gray-100 rounded-lg transition-colors text-sm font-medium">
              🎮 Player Mode
            </a>
            <a href="ai_trainer.html" class="px-4 py-2 text-gray-600 hover:text-gray-900 hover:bg-gray-100 rounded-lg transition-colors text-sm font-medium">
              🧠 AI Training
            </a>
            <a href="compare.html" class="px-4 py-2 bg-blue-600 text-white rounded-lg shadow-sm text-sm font-medium">
              📊 Compare
            </a>
          </nav>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto p-6">
      <h2 class="text-2xl font-bold text-gray-900 mb-6">AI Model Comparison</h2>

    <div class="controls-panel">
      <div class="model-input-group">
        <label for="model-a-input">Model A:</label>
        <textarea
          id="model-a-input"
          rows="5"
          placeholder="Paste model A weights here..."
        ></textarea>
      </div>
      <div class="model-input-group">
        <label for="model-b-input">Model B:</label>
        <textarea
          id="model-b-input"
          rows="5"
          placeholder="Paste model B weights here..."
        ></textarea>
      </div>
      <div class="control-group">
        <label for="game-count-input">Number of Games to Run:</label>
        <input
          type="number"
          id="game-count-input"
          value="5"
          min="1"
          max="1000"
        />
      </div>
      <div class="control-group">
        <label>Simulation Controls:</label>
        <div class="button-group">
          <button id="start-comparison-btn">Start Comparison</button>
          <button id="speed-toggle">Speed: 1x</button>
          <button id="pause-toggle">Pause</button>
        </div>
      </div>
      <div id="progress-indicator">Load models and start comparison.</div>
    </div>

    <div class="battle-ground">
      <div class="model-column">
        <h2>Model A</h2>
        <div id="score-container-a" class="score-container">
          Current Score: <span>0</span>
        </div>
        <div id="shape-panel-a" class="shape-panel">
          <h4>Shape Batch</h4>
          <div class="shape-container"></div>
        </div>
        <div class="board-wrapper">
          <div id="game-over-a" class="status-overlay hidden">Game Over!</div>
          <div id="game-board-a" class="game-board grid-8x8"></div>
        </div>
      </div>
      <div class="model-column">
        <h2>Model B</h2>
        <div id="score-container-b" class="score-container">
          Current Score: <span>0</span>
        </div>
        <div id="shape-panel-b" class="shape-panel">
          <h4>Shape Batch</h4>
          <div class="shape-container"></div>
        </div>
        <div class="board-wrapper">
          <div id="game-over-b" class="status-overlay hidden">Game Over!</div>
          <div id="game-board-b" class="game-board grid-8x8"></div>
        </div>
      </div>
    </div>

    <div class="full-width-container chart-wrapper">
      <h3>Model Score Per Game</h3>
      <canvas id="comparisonChart"></canvas>
      <h3>Model Average Score Per Game</h3>
      <canvas id="averageScoreChart"></canvas>
      <button id="copy-chart-data-btn" style="margin-top: 1em">
        Copy Chart Data as JSON
      </button>
      <div
        id="model-insights"
        style="
          margin-top: 2em;
          padding: 1em;
          background: #f8f9fa;
          border-radius: 8px;
          border: 1px solid #eee;
          font-size: 1.05em;
        "
      ></div>
    </div>

    <div class="mode-switch full-width-switch">
      <button id="switch-to-player-mode" class="action-btn">
        Switch to Player Mode
      </button>
      <button id="switch-to-ai-mode" class="action-btn">
        Switch to AI Mode
      </button>
    </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module" src="js/compare.js"></script>
  </body>
</html>
