<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Player Mode - Color Box Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-gray-50 font-sans">
    
    <!-- Application Header -->
    <header class="bg-white shadow-sm border-b border-gray-200">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">
          
          <!-- Logo & Brand -->
          <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-gradient-to-br from-blue-500 to-purple-600 rounded-lg flex items-center justify-center">
              <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M3 4a1 1 0 011-1h12a1 1 0 011 1v2a1 1 0 01-1 1H4a1 1 0 01-1-1V4zm0 4a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H4a1 1 0 01-1-1V8zm8 0a1 1 0 011-1h4a1 1 0 011 1v2a1 1 0 01-1 1h-4a1 1 0 01-1-1V8zm0 4a1 1 0 011-1h4a1 1 0 011 1v2a1 1 0 01-1 1h-4a1 1 0 01-1-1v-2z" clip-rule="evenodd"></path>
              </svg>
            </div>
            <div>
              <h1 class="text-xl font-bold text-gray-900">AI Game Trainer</h1>
              <p class="text-xs text-gray-500">Neural Evolution Platform</p>
            </div>
          </div>

          <!-- Navigation -->
          <nav class="flex items-center gap-1">
            <a href="player.html" class="px-4 py-2 bg-blue-600 text-white rounded-lg shadow-sm text-sm font-medium">
              🎮 Player Mode
            </a>
            <a href="ai_trainer.html" class="px-4 py-2 text-gray-600 hover:text-gray-900 hover:bg-gray-100 rounded-lg transition-colors text-sm font-medium">
              🧠 AI Training
            </a>
            <a href="compare.html" class="px-4 py-2 text-gray-600 hover:text-gray-900 hover:bg-gray-100 rounded-lg transition-colors text-sm font-medium">
              📊 Compare
            </a>
          </nav>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto p-6">
        <div class="game-container">
        <div id="game-over-overlay" class="hidden">
            <div>Game Over!</div>
            <div id="final-score"></div>
            <button id="reset-button">Play Again</button>
        </div>
        
        <!-- The main game board -->
       <div id="game-board" class="game-board grid-8x8"></div>

        <!-- Right-side panel for all player controls -->
        <div class="right-panel">
            <div id="player-view">
                <div id="shapes-container"></div>
                
                <div id="score-container" class="score-container">
                    <h2>Score: <span id="score">0</span></h2>
                </div>
                
                <div class="hint-container">
                    <button id="hint-button" disabled>Get AI Hint</button>
                </div>
                
                <div id="model-loader-container">
                    <h4>AI Hint Engine</h4>
                    <div class="model-input-group">
                        <label for="model-a-input">Model A:</label>
                        <textarea id="model-a-input" rows="4" placeholder="Paste trained model A..."></textarea>
                    </div>
                    <div class="model-input-group">
                        <label for="model-b-input">Model B:</label>
                        <textarea id="model-b-input" rows="4" placeholder="Paste trained model B..."></textarea>
                    </div>
                    <button id="load-models-btn">Load Models</button>
                    <div id="model-selection-container" class="hidden">
                        <label><input type="radio" name="active-model" value="A" checked> Use Model A</label>
                        <label><input type="radio" name="active-model" value="B"> Use Model B</label>
                    </div>
                </div>
                
                 <div class="mode-switch">
                    <button class="active">Player Mode</button>
                    <a href="ai_trainer.html"><button>Go to AI Training</button></a>
                </div>
            </div>
        </div>
    </div>
    </main>
    
    <!-- This page only needs main.js to run the controller -->
    <script type="module" src="js/main.js"></script>
</body>
</html>
