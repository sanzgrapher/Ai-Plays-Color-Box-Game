<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive Agent Replay</title>
    <link rel="stylesheet" href="../style.css" />
    <style>
      body { justify-content: flex-start; }
      .replay-controls { width: 100%; max-width: 800px; padding: 20px; background-color: #e9ecef; border-radius: 8px; margin-bottom: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
      textarea { width: 100%; min-height: 150px; font-family: monospace; font-size: 14px; margin-bottom: 10px; }
      button { padding: 10px 20px; font-size: 16px; cursor: pointer; border: none; border-radius: 4px; background-color: #007bff; color: white; }
      .replay-wrapper { display: flex; gap: 40px; justify-content: center; align-items: flex-start; }
      #shapes-container { min-height: 200px; border: 1px dashed #ccc; padding: 10px; }
      #replay-status { font-size: 1.1em; font-weight: bold; padding: 12px; border-radius: 5px; margin-top: 15px; text-align: center; border: 1px solid transparent; }
      #replay-status.possible { background-color: #d4edda; color: #155724; border-color: #c3e6cb; }
      #replay-status.gameover { background-color: #f8d7da; color: #721c24; border-color: #f5c6cb; }
    </style>
  </head>
  <body>
    <h1>Interactive Agent Replay</h1>
    <div class="replay-controls">
      <p>Paste an agent's copied state. The tool will show if a move is possible. You can then play using the available shapes.</p>
      <textarea id="state-json-input" placeholder="Paste agent state JSON here..."></textarea>
      <button id="load-state-btn">Load State</button>
    </div>
    <div class="replay-wrapper">
      <div id="game-board" class="grid-8x8"></div>
      <div class="right-panel">
         <div class="score-container"><h2>Score: <span id="score">0</span></h2></div>
         <div id="replay-status">Load a state to see its status</div>
         <h3>Shape Batch:</h3>
         <div id="shapes-container"></div>
      </div>
    </div>
    <script type="module" src="replay.js"></script>
  </body>
</html>
