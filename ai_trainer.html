<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Trainer - Color Box Game</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>AI Trainer</h1>
    <div id="ai-stats">
      <span>Generation: <b id="generation-stat">0</b></span>
      <span>Alive: <b id="alive-stat">0</b></span>
      <span>High Score: <b id="highscore-stat">0</b></span>
      <button id="speed-toggle">Speed: 1x</button>
      <button id="pause-toggle">Pause</button>
    </div>

    <!-- Main container for the new trainer layout -->
    <div class="trainer-content">
      <!-- SECTION 1: Two-Column Layout -->
      <div class="top-section">
        <!-- Column 1: Board Visualizer -->
        <div id="game-board" class="game-board grid-8x8"></div>

        <!-- Column 2: Data Panels -->
        <div class="data-panel">
          <div id="model-output-container">
            <h4>Best Model Output</h4>
            <p>Copy this JSON data after training is complete.</p>
            <textarea id="best-model-output" readonly rows="5"></textarea>
          </div>
        </div>
        <div class="mode-switch">
          <a href="player.html"><button>Go to Player Mode</button></a>
          <button class="active">AI Training</button>
        </div>
      </div>

      <div style="width: 100%; display: flex">
        <div class="chart-container" style="flex: 0 0 75%; max-width: 75%">
          <h3>Generation vs High Score</h3>
          <canvas id="genHighScoreChart"></canvas>
          <h3>Agent Scores After Death</h3>
          <canvas id="agentScoresChart"></canvas>
        </div>
        <div id="highscore-container" style="flex: 0 0 25%; max-width: 25%">
          <h3>Top 5 Scores</h3>
          <ol id="highscore-list"></ol>
        </div>
      </div>
      <br />

      <!-- SECTION 2: Full-Width Agent List -->
      <div id="agents-container">
        <h3>Current Generation Agents</h3>
        <div id="agents-list"></div>
      </div>

      <!-- Page Navigation -->
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- This page also uses main.js, which detects the page and runs the simulation -->
    <script type="module" src="js/main.js"></script>
  </body>
</html>
